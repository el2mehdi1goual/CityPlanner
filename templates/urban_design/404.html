{% extends "base.html" %}

{% block title %}404 | CityPlanner{% endblock %}

{% block content %}
<section class="error-shell">
    <div class="premium-panel text-center">
        <i class="bi bi-sign-stop error-icon"></i>
        <h1 class="page-title mb-2">Error 404</h1>
        <p class="page-subtitle mb-4">The page you are looking for does not exist.</p>
        <div class="d-flex flex-wrap justify-content-center gap-2">
            <a href="{% url 'home' %}" class="btn btn-premium-primary"><i class="bi bi-house me-1"></i> Home</a>
            <a href="{% url 'dashboard' %}" class="btn btn-premium-ghost"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a>
            <a href="javascript:history.back()" class="btn btn-premium-ghost"><i class="bi bi-arrow-left me-1"></i> Back</a>
        </div>
    </div>
</section>
{% endblock %}
