{% extends "base.html" %}

{% block title %}Delete Project | CityPlanner{% endblock %}

{% block content %}
<section class="auth-shell d-flex align-items-center justify-content-center">
    <div class="auth-card auth-card-wide">
        <div class="warning-head text-center mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <h1 class="auth-title mt-3">Delete Project</h1>
            <p class="auth-subtitle mb-0">This action is permanent and cannot be undone.</p>
        </div>

        <div class="premium-alert alert alert-danger mb-4">
            You are about to delete <strong>"{{ projet.titre }}"</strong> and all associated generated data.
        </div>

        <div class="d-grid gap-2">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100">
                    <i class="bi bi-trash me-1"></i> Confirm deletion
                </button>
            </form>
            <a href="{% url 'projet_detail' projet.pk %}" class="btn btn-premium-ghost w-100">
                <i class="bi bi-x-circle me-1"></i> Cancel
            </a>
        </div>
    </div>
</section>
{% endblock %}
